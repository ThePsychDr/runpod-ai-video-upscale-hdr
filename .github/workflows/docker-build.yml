name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. v1.2, latest)"
        required: false
        default: "serverless"
  release:
    types: [published]

# Opt into Node.js 24 for all JavaScript actions in this workflow.
# Node.js 20 becomes unavailable on GHA runners September 2026 and is
# already deprecated. actions/checkout@v4, docker/setup-buildx-action@v3,
# docker/login-action@v3, and docker/build-push-action@v6 all still ship
# Node 20 runtimes but support Node 24 via this env var. Once newer
# versions of those actions ship with Node 24 bundled, this env can be
# removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Configure git init default branch
        # Silences the "Using 'master' as the name for the initial branch"
        # hint that actions/checkout prints when it runs `git init` without
        # an explicit init.defaultBranch configured. Harmless but noisy.
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "tags=thepsych/upscale-hdr:${VERSION},thepsych/upscale-hdr:serverless" >> "$GITHUB_OUTPUT"
          else
            echo "tags=thepsych/upscale-hdr:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
